<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reckoning Table — AI Dungeon Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#100E19;
    --panel:#1B1830;
    --panel-2:#241F3D;
    --line: rgba(201,162,39,0.22);
    --gold:#C9A227;
    --gold-bright:#E9C766;
    --crimson:#8C2A36;
    --crimson-bright:#B23A47;
    --parchment:#EDE6D3;
    --ink:#E9E4D8;
    --muted:#9994A8;
    --emerald:#3E7C5A;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background: radial-gradient(1200px 800px at 15% -10%, #211c3a 0%, var(--void) 55%), var(--void);
    color:var(--ink);
    font-family:'Crimson Pro', serif;
    font-size:16px;
    min-height:100vh;
  }
  h1,h2,h3,.display{
    font-family:'Cinzel', serif;
    letter-spacing:0.03em;
  }
  #app{max-width:1180px;margin:0 auto;padding:20px 18px 60px;}

  /* ---------- Header ---------- */
  .top{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;
    padding-bottom:18px;margin-bottom:22px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .brand .glyph{
    width:44px;height:44px;border-radius:50%;
    border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel Decorative';color:var(--gold);font-size:20px;
    box-shadow: inset 0 0 0 3px rgba(0,0,0,0.35), 0 0 18px rgba(201,162,39,0.18);
    flex-shrink:0;
  }
  .brand h1{font-size:21px;margin:0;color:var(--parchment);font-weight:700;}
  .brand .sub{font-size:12.5px;color:var(--muted);margin-top:2px;letter-spacing:0.08em;text-transform:uppercase;}
  .seal{
    display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);
    padding:8px 14px;border-radius:8px;
  }
  .seal .code{
    font-family:'Cinzel';font-weight:700;letter-spacing:0.18em;color:var(--gold-bright);font-size:17px;
  }
  .seal .label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;}

  /* ---------- Buttons / inputs ---------- */
  button{
    font-family:'Cinzel', serif;font-size:13px;letter-spacing:0.04em;
    background:var(--panel-2);color:var(--parchment);
    border:1px solid var(--line);border-radius:7px;
    padding:10px 16px;cursor:pointer;transition:all .15s ease;
    text-transform:uppercase;
  }
  button:hover:not(:disabled){border-color:var(--gold);color:var(--gold-bright);background:#2A2447;}
  button:disabled{opacity:0.45;cursor:not-allowed;}
  button.primary{background:linear-gradient(180deg, #3a2f5c, #241f3d);border-color:var(--gold);color:var(--gold-bright);}
  button.primary:hover:not(:disabled){box-shadow:0 0 0 1px var(--gold), 0 0 20px rgba(201,162,39,0.25);}
  button.danger{border-color:var(--crimson);color:#e8a5ab;}
  button.danger:hover{background:#3a1e22;color:#ffb9c0;}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted);padding:6px 8px;}
  button.ghost:hover{color:var(--gold-bright);}

  input, textarea, select{
    font-family:'Crimson Pro', serif;font-size:15px;
    background:#171429;color:var(--ink);
    border:1px solid var(--line);border-radius:7px;
    padding:9px 12px;width:100%;
  }
  input:focus, textarea:focus, select:focus{outline:none;border-color:var(--gold);}
  label{font-size:11.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);display:block;margin-bottom:5px;}
  .field{margin-bottom:14px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:120px;}

  /* ---------- Cards / panels ---------- */
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:20px;margin-bottom:16px;
  }
  .card h2{font-size:15px;margin:0 0 14px;color:var(--gold-bright);}
  .hint{color:var(--muted);font-size:13.5px;line-height:1.5;}

  /* ---------- Landing ---------- */
  .landing-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:30px;}
  @media(max-width:720px){.landing-grid{grid-template-columns:1fr;}}
  .choice-card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:26px;
    cursor:pointer;transition:all .18s ease;
  }
  .choice-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.35);}
  .choice-card .glyph2{font-family:'Cinzel Decorative';font-size:30px;color:var(--gold);margin-bottom:10px;}
  .choice-card h3{margin:0 0 8px;color:var(--parchment);font-size:18px;}
  .choice-card p{color:var(--muted);font-size:14px;line-height:1.5;margin:0;}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .tab{
    padding:10px 16px;font-family:'Cinzel';font-size:12.5px;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--gold-bright);border-color:var(--gold);}

  /* ---------- Story log ---------- */
  .log{max-height:520px;overflow-y:auto;padding-right:6px;}
  .log::-webkit-scrollbar{width:8px;}
  .log::-webkit-scrollbar-thumb{background:var(--panel-2);border-radius:4px;}
  .entry{margin-bottom:18px;}
  .entry .meta{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}
  .entry.dm .body{display:flex;gap:12px;}
  .dropcap{
    font-family:'Cinzel Decorative';font-size:44px;line-height:1;color:var(--gold);
    flex-shrink:0;width:44px;text-align:center;padding-top:2px;
  }
  .entry.dm .text{line-height:1.65;font-size:16px;color:var(--ink);}
  .entry.player .text{background:var(--panel-2);border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 8px 8px 0;font-style:italic;color:var(--parchment);}
  .entry.roll .text{color:var(--gold-bright);font-family:'Cinzel';font-size:13.5px;}
  .entry.system .text{color:var(--muted);font-size:13px;text-align:center;}
  .rule{border:none;border-top:1px solid var(--line);margin:26px 0;}

  /* ---------- Party ---------- */
  .party-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
  .pc{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;}
  .pc .name{font-family:'Cinzel';font-size:15px;color:var(--parchment);}
  .pc .cls{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .bar-track{background:#0e0c1a;border-radius:5px;height:8px;overflow:hidden;margin:4px 0 8px;}
  .bar-fill{height:100%;background:linear-gradient(90deg, var(--crimson), var(--crimson-bright));}
  .pc .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11.5px;text-align:center;color:var(--muted);margin-top:8px;}
  .pc .stats div b{display:block;color:var(--gold-bright);font-size:14px;}
  .unclaimed{border-style:dashed;color:var(--muted);display:flex;align-items:center;justify-content:center;min-height:120px;font-size:13px;text-align:center;}

  /* ---------- Dice ---------- */
  .dice-quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .dice-result{
    text-align:center;padding:26px;background:var(--panel-2);border-radius:10px;border:1px solid var(--line);
  }
  .dice-result .num{font-family:'Cinzel Decorative';font-size:52px;color:var(--gold-bright);}
  .dice-result .expr{color:var(--muted);font-size:13px;margin-top:4px;}

  /* ---------- Combat ---------- */
  .combatant{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:8px;
  }
  .combatant.current{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .init-badge{
    width:32px;height:32px;border-radius:50%;background:var(--void);border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:'Cinzel';color:var(--gold-bright);font-size:13px;
  }

  .thinking{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13.5px;font-style:italic;padding:10px 0;}
  .flame{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:flicker 1s infinite ease-in-out;}
  .flame:nth-child(2){animation-delay:.15s;} .flame:nth-child(3){animation-delay:.3s;}
  @keyframes flicker{0%,100%{opacity:.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.1);}}

  .banner{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border:1px solid;}
  .banner.warn{background:rgba(140,42,54,0.15);border-color:var(--crimson);color:#f0b8bd;}
  .banner.info{background:rgba(201,162,39,0.1);border-color:var(--gold);color:var(--gold-bright);}

  .small{font-size:12px;color:var(--muted);}
  a.link{color:var(--gold-bright);cursor:pointer;text-decoration:underline;}

  /* ---------- TV Mode ---------- */
  #app.tv-mode{color:#F6F3E9;}
  #app.tv-mode .brand h1{font-size:30px;}
  #app.tv-mode .brand .sub{font-size:15px;}
  #app.tv-mode .seal .code{font-size:28px;}
  #app.tv-mode .seal .label{font-size:13px;}
  #app.tv-mode .card h2{font-size:19px;}
  #app.tv-mode .hint{font-size:17px;line-height:1.6;}
  #app.tv-mode button{font-size:16px;padding:14px 22px;}
  #app.tv-mode .tab{font-size:16px;padding:14px 22px;}
  #app.tv-mode .log{max-height:640px;}
  #app.tv-mode .entry .meta{font-size:13px;}
  #app.tv-mode .entry.dm .text{font-size:23px;line-height:1.7;color:#F6F3E9;}
  #app.tv-mode .dropcap{font-size:60px;width:60px;}
  #app.tv-mode .entry.player .text{font-size:20px;}
  #app.tv-mode .entry.roll .text{font-size:17px;}
  #app.tv-mode .pc .name{font-size:19px;}
  #app.tv-mode .pc .cls, #app.tv-mode .pc .small{font-size:15px;}
  #app.tv-mode .pc .stats{font-size:14px;}
  #app.tv-mode .pc .stats div b{font-size:17px;}
  #app.tv-mode input, #app.tv-mode textarea, #app.tv-mode select{font-size:18px;padding:12px 14px;}
  #app.tv-mode label{font-size:13px;}
  #app.tv-mode .dice-result .num{font-size:64px;}
  #app.tv-mode .combatant{padding:14px 18px;}
  #app.tv-mode .init-badge{width:38px;height:38px;font-size:15px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================= STATE ============================= */
let view = 'landing'; // landing | dm-setup | dm | player-join | player
let role = null;
let sessionCode = null;
let playerName = null;
let characterId = null;
let session = null; // synced object
let activeTab = 'story';
let pollHandle = null;
let generating = false;
let creatingSession = false;
let joiningSession = false;
let lastError = null;
let tvMode = false;
let anthropicKey = null; // DM's own key, kept in this browser only, never synced to the gist
let generatingNarration = false;
let prefilledInviteCode = null;

function toggleTvMode(){ tvMode = !tvMode; render(); }

const CLASSES = ['Fighter','Wizard','Rogue','Cleric','Ranger','Barbarian','Bard','Druid','Paladin','Sorcerer','Warlock','Monk'];
const RACES = ['Human','Elf','Dwarf','Halfling','Half-Orc','Tiefling','Dragonborn','Gnome'];

function uid(){ return Math.random().toString(36).slice(2,10); }
function now(){ return Date.now(); }

function genCode(){
  const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let c = '';
  for(let i=0;i<4;i++) c += letters[Math.floor(Math.random()*letters.length)];
  return c;
}

function freshSession(campaignName, setting){
  return {
    version: 1,
    campaignName,
    setting,
    party: [],
    log: [{id: uid(), type:'system', author:'The Table', text:`The campaign "${campaignName}" is ready. The Dungeon Master may begin the tale.`, ts: now()}],
    pendingActions: [],
    combat: {active:false, order:[], turnIndex:0},
    updatedAt: now()
  };
}

/* ============================= STORAGE (GitHub Gists) =============================
   Syncs across devices using a GitHub Gist as shared storage — verified to support
   CORS for both reads and authenticated writes from a plain browser. The DM creates
   a Gist and generates a "gist-scoped" GitHub personal access token; the resulting
   invite code bundles the gist ID + token so every device (DM and players alike)
   can read AND write the shared session file. Conditional requests (ETag) keep
   polling cheap and mostly free against GitHub's rate limits. */
const GITHUB_API = 'https://api.github.com';
const POLL_MS = 8000;
let sharedToken = null;   // gist-scoped GitHub token, shared via the invite code
let lastEtag = null;

function ghHeaders(extra){
  const h = Object.assign({'Accept':'application/vnd.github+json'}, extra||{});
  if(sharedToken) h['Authorization'] = 'token ' + sharedToken;
  return h;
}

async function ghCreateGist(campaignName, initialStateObj){
  let res;
  try{
    res = await fetch(`${GITHUB_API}/gists`, {
      method:'POST',
      headers: ghHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({
        description: 'The Reckoning Table — ' + campaignName,
        public: true,
        files: { 'session.json': { content: JSON.stringify(initialStateObj) } }
      })
    });
  }catch(networkErr){
    throw new Error('NETWORK: ' + (networkErr && networkErr.message ? networkErr.message : 'request failed'));
  }
  if(!res.ok){
    let bodyTxt=''; try{ bodyTxt = await res.text(); }catch(e){}
    throw new Error(`HTTP ${res.status} — ${bodyTxt.slice(0,160)}`);
  }
  const data = await res.json();
  lastEtag = res.headers.get('ETag');
  return data.id;
}

async function ghGetGist(id){
  const headers = ghHeaders();
  if(lastEtag) headers['If-None-Match'] = lastEtag;
  let res;
  try{
    res = await fetch(`${GITHUB_API}/gists/${id}`, {headers, cache:'no-store'});
  }catch(networkErr){
    throw new Error('NETWORK: ' + (networkErr && networkErr.message ? networkErr.message : 'request failed'));
  }
  if(res.status === 304) return {unchanged:true};
  if(!res.ok){
    let bodyTxt=''; try{ bodyTxt = await res.text(); }catch(e){}
    throw new Error(`HTTP ${res.status} — ${bodyTxt.slice(0,160)}`);
  }
  lastEtag = res.headers.get('ETag') || lastEtag;
  const data = await res.json();
  const file = data.files && data.files['session.json'];
  if(!file || !file.content) throw new Error('session.json missing from gist');
  return {unchanged:false, state: JSON.parse(file.content)};
}

async function ghUpdateGist(id, obj){
  let res;
  try{
    res = await fetch(`${GITHUB_API}/gists/${id}`, {
      method:'PATCH',
      headers: ghHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({ files: { 'session.json': { content: JSON.stringify(obj) } } })
    });
  }catch(networkErr){
    throw new Error('NETWORK: ' + (networkErr && networkErr.message ? networkErr.message : 'request failed'));
  }
  if(!res.ok){
    let bodyTxt=''; try{ bodyTxt = await res.text(); }catch(e){}
    throw new Error(`HTTP ${res.status} — ${bodyTxt.slice(0,160)}`);
  }
  lastEtag = res.headers.get('ETag') || lastEtag;
}

async function loadSession(id){
  try{
    const r = await ghGetGist(id);
    return r.unchanged ? null : r.state;
  }catch(e){ lastError = 'Could not load session — ' + (e && e.message ? e.message : 'unknown error'); return null; }
}
async function saveSession(id, obj){
  obj.updatedAt = now();
  obj.version = (obj.version||0)+1;
  try{
    await ghUpdateGist(id, obj);
    return true;
  }catch(e){ lastError = 'Could not sync — ' + (e && e.message ? e.message : 'unknown error'); return false; }
}

async function refreshFromRemote(){
  if(!sessionCode) return;
  try{
    const r = await ghGetGist(sessionCode);
    if(!r.unchanged && r.state && (!session || r.state.version > session.version)){
      session = r.state;
      render();
    }
  }catch(e){ /* silent — will retry on next poll */ }
}
function startPolling(){
  stopPolling();
  pollHandle = setInterval(refreshFromRemote, POLL_MS);
}
function stopPolling(){
  if(pollHandle) clearInterval(pollHandle);
  pollHandle = null;
}

function makeInviteCode(id, token){ return id + '::' + token; }
function parseInviteCode(code){
  const parts = (code||'').trim().split('::');
  if(parts.length !== 2 || !parts[0] || !parts[1]) return null;
  return {id: parts[0].trim(), token: parts[1].trim()};
}

/* ============================= DM NARRATION (manual bridge) =============================
   Claude's artifact sandbox can't reach arbitrary third-party APIs, so this app is meant
   to run in a normal browser tab for everyone, DM included — that's also why it can't
   silently call the Anthropic API for you. Instead: the DM builds a prompt here, pastes
   it to Claude in a separate chat, and pastes the reply back in. */

function buildDMPrompt(kind){
  const partySummary = session.party.length
    ? session.party.map(p=>`${p.name} — ${p.race} ${p.class}, Level ${p.level}, HP ${p.hp}/${p.maxHp}, AC ${p.ac}${p.playerName?` (played by ${p.playerName})`:' (unclaimed / NPC-controlled)'}`).join('\n')
    : 'No adventurers have been added yet.';

  const recentLog = session.log.slice(-18).map(e=>{
    if(e.type==='dm') return `DM: ${e.text}`;
    if(e.type==='player') return `${e.author}: ${e.text}`;
    if(e.type==='roll') return `[roll] ${e.author}: ${e.text}`;
    return `[${e.author}]: ${e.text}`;
  }).join('\n');

  const pending = session.pendingActions.map(a=>`${a.author}: ${a.text}`).join('\n');

  let instruction;
  if(kind === 'open'){
    instruction = `Begin the campaign. Set the opening scene vividly and establish where the party is and what's immediately in front of them. End with a clear prompt inviting the party to act.`;
  } else if(kind === 'continue'){
    instruction = pending
      ? `Resolve the following player actions in character order that makes narrative sense, describe consequences, and move the story forward:\n${pending}`
      : `Continue the story with a new development, complication, or scene beat, since the party hasn't acted yet. Keep momentum.`;
  } else {
    instruction = kind;
  }

  return `You are an expert, impartial Dungeons & Dragons 5th Edition Dungeon Master running a live session for a real group of players. Campaign: "${session.campaignName}". Setting/premise: ${session.setting}.

Rules for your narration:
- Write vivid, concise scene narration (150-260 words), addressing the party directly.
- Respect established facts from the story so far; never contradict prior events.
- When outcomes are uncertain, state what roll would resolve it rather than deciding yourself, unless a roll result was already reported.
- Track consequences: injuries, NPC reactions, environmental changes.
- End with a clear hook, question, or set of options for what the party can do or see next.

PARTY:
${partySummary}

STORY SO FAR (most recent):
${recentLog || '(the story has not yet begun)'}

DM INSTRUCTION:
${instruction}`;
}

async function generateNarration(kind){
  if(generatingNarration) return;
  generatingNarration = true; lastError = null; render();
  try{
    const prompt = buildDMPrompt(kind);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{role:'user', content: prompt}]
      })
    });
    if(!res.ok){
      let bodyTxt=''; try{ bodyTxt = await res.text(); }catch(e){}
      throw new Error(`HTTP ${res.status} — ${bodyTxt.slice(0,160)}`);
    }
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    if(!text) throw new Error('empty response from the AI');
    await postDMNarration(text);
  }catch(e){
    lastError = 'The AI DM call failed — ' + (e && e.message ? e.message : 'unknown error') + '. You can still use the copy/paste option below.';
  }
  generatingNarration = false;
  render();
}


let lastCopiedPrompt = false;
function copyDMPrompt(kind){
  const prompt = buildDMPrompt(kind);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(prompt).then(()=>{
      lastCopiedPrompt = true; render();
      setTimeout(()=>{ lastCopiedPrompt=false; render(); }, 4000);
    }).catch(()=>{ window.prompt('Copy this prompt manually:', prompt); });
  } else {
    window.prompt('Copy this prompt manually:', prompt);
  }
}

async function postDMNarration(text){
  if(!text.trim()) return;
  await refreshFromRemote();
  session.log.push({id:uid(), type:'dm', author:'Dungeon Master', text: text.trim(), ts: now()});
  session.pendingActions = [];
  await saveSession(sessionCode, session);
  render();
}

/* ============================= DICE ============================= */
function rollDice(expr){
  const m = expr.trim().toLowerCase().match(/^(\d*)d(\d+)\s*([+-]\s*\d+)?$/);
  if(!m) return null;
  const count = parseInt(m[1]||'1',10);
  const sides = parseInt(m[2],10);
  const mod = m[3] ? parseInt(m[3].replace(/\s/g,''),10) : 0;
  if(count<1||count>20||sides<2||sides>100) return null;
  let rolls = [];
  for(let i=0;i<count;i++) rolls.push(1+Math.floor(Math.random()*sides));
  const total = rolls.reduce((a,b)=>a+b,0)+mod;
  return {expr, rolls, mod, total};
}

/* ============================= ACTIONS ============================= */
async function createSession(campaignName, setting, token){
  lastError = null;
  creatingSession = true; render();
  try{
    sharedToken = token;
    session = freshSession(campaignName, setting);
    sessionCode = await ghCreateGist(campaignName, session);
    role = 'dm';
    view = 'dm';
    startPolling();
  }catch(e){
    lastError = 'Could not create a session — ' + (e && e.message ? e.message : 'unknown error');
    sharedToken = null;
  }
  creatingSession = false;
  render();
}

async function joinAsDM(inviteCode){
  const parsed = parseInviteCode(inviteCode);
  if(!parsed){ lastError='That invite code looks incomplete — make sure you pasted the whole thing.'; render(); return; }
  joiningSession = true; lastError=null; render();
  sharedToken = parsed.token; lastEtag = null;
  const s = await loadSession(parsed.id);
  joiningSession = false;
  if(!s){ if(!lastError) lastError='No session found with that code.'; sharedToken=null; render(); return; }
  sessionCode = parsed.id; session = s; role='dm'; view='dm';
  startPolling(); render();
}

async function joinAsPlayer(inviteCode, name){
  const parsed = parseInviteCode(inviteCode);
  if(!parsed){ lastError='That invite code looks incomplete — make sure you pasted the whole thing your DM sent.'; render(); return; }
  joiningSession = true; lastError=null; render();
  sharedToken = parsed.token; lastEtag = null;
  const s = await loadSession(parsed.id);
  joiningSession = false;
  if(!s){ if(!lastError) lastError='No session found with that code.'; sharedToken=null; render(); return; }
  sessionCode = parsed.id; session = s; role='player'; playerName = name; view='player';
  startPolling(); render();
}

function copySessionCode(){
  const invite = makeInviteCode(sessionCode, sharedToken);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(invite).then(()=>{
      const btn = document.getElementById('copy-code-btn');
      if(btn){ const old = btn.textContent; btn.textContent='Copied!'; setTimeout(()=>{btn.textContent=old;},1500); }
    });
  }
}

function copyJoinLink(){
  const invite = makeInviteCode(sessionCode, sharedToken);
  const link = `${location.origin}${location.pathname}?join=${encodeURIComponent(invite)}`;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(link).then(()=>{
      const btn = document.getElementById('copy-link-btn');
      if(btn){ const old = btn.textContent; btn.textContent='Copied!'; setTimeout(()=>{btn.textContent=old;},1500); }
    });
  }
}

async function addOrClaimCharacter(charDraft){
  await refreshFromRemote();
  session.party.push(charDraft);
  characterId = charDraft.id;
  await saveSession(sessionCode, session);
  render();
}

async function updateCharacter(id, patch){
  await refreshFromRemote();
  const pc = session.party.find(p=>p.id===id);
  if(!pc) return;
  Object.assign(pc, patch);
  await saveSession(sessionCode, session);
  render();
}

async function removeCharacter(id){
  await refreshFromRemote();
  session.party = session.party.filter(p=>p.id!==id);
  await saveSession(sessionCode, session);
  render();
}

async function submitPlayerAction(text){
  if(!text.trim()) return;
  await refreshFromRemote();
  session.log.push({id:uid(), type:'player', author: playerName, text, ts: now()});
  session.pendingActions.push({id:uid(), author: playerName, text, ts: now()});
  await saveSession(sessionCode, session);
  render();
}

async function postRoll(author, result){
  await refreshFromRemote();
  const detail = result.rolls.length>1 ? `[${result.rolls.join(', ')}]${result.mod?(result.mod>0?' +'+result.mod:' '+result.mod):''} = ` : (result.mod? `[${result.rolls[0]}]${result.mod>0?' +'+result.mod:' '+result.mod} = `:'');
  session.log.push({id:uid(), type:'roll', author, text:`rolled ${result.expr} → ${detail}${result.total}`, ts: now()});
  await saveSession(sessionCode, session);
  render();
}

async function addCombatant(name, initiative){
  await refreshFromRemote();
  session.combat.order.push({id:uid(), name, initiative});
  session.combat.order.sort((a,b)=>b.initiative-a.initiative);
  session.combat.active = true;
  await saveSession(sessionCode, session);
  render();
}
async function nextTurn(){
  await refreshFromRemote();
  session.combat.turnIndex = (session.combat.turnIndex+1) % Math.max(session.combat.order.length,1);
  await saveSession(sessionCode, session);
  render();
}
async function endCombat(){
  await refreshFromRemote();
  session.combat = {active:false, order:[], turnIndex:0};
  await saveSession(sessionCode, session);
  render();
}

function leaveSession(){
  stopPolling();
  view='landing'; role=null; sessionCode=null; session=null; playerName=null; characterId=null;
  sharedToken=null; lastEtag=null; anthropicKey=null;
  render();
}

function adjustHP(id, dir){
  const step = window.prompt(dir>0 ? 'Heal how many HP?' : 'Damage how many HP?', '1');
  const n = parseInt(step,10);
  if(!n || n<0) return;
  const pc = session.party.find(p=>p.id===id);
  if(!pc) return;
  const newHp = Math.max(0, Math.min(pc.maxHp, pc.hp + (dir>0? n : -n)));
  updateCharacter(id, {hp:newHp});
}

  ${renderHeader()}
  <div class="card" style="margin-bottom:14px;">
    <h2 style="margin-bottom:4px;">${esc(session.campaignName)}</h2>
    <p class="hint" style="margin:0;">${esc(session.setting)}</p>
  </div>
  ${renderBanners()}
  <div class="tabs">
    ${tabs.map(t=>`<div class="tab ${activeTab===t?'active':''}" onclick="activeTab='${t}'; render();">${labels[t]}</div>`).join('')}
  </div>
  ${body}
  `;
}

/* ============================= MAIN RENDER ============================= */
function render(){
  const app = document.getElementById('app');
  let html = '';
  if(view==='landing') html = viewLanding();
  else if(view==='dm-setup') html = viewDMSetup();
  else if(view==='player-join') html = viewPlayerJoin();
  else if(view==='dm') html = viewSession(true);
  else if(view==='player') html = viewSession(false);
  app.innerHTML = html;
  app.className = tvMode ? 'tv-mode' : '';

  const logEl = document.getElementById('log-scroll');
  if(logEl) logEl.scrollTop = logEl.scrollHeight;
}

(function checkJoinLink(){
  try{
    const params = new URLSearchParams(window.location.search);
    const j = params.get('join');
    if(j){
      prefilledInviteCode = decodeURIComponent(j);
      view = 'player-join';
      history.replaceState(null, '', window.location.pathname);
    }
  }catch(e){ /* ignore malformed links */ }
})();

render();
</script>
</body>
</html>
